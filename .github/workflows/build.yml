name: Build & Release InputSync

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64 (native binary)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libx11-dev libxtst-dev libxi-dev \
            libxdo-dev libxkbcommon-dev \
            libwayland-dev \
            libglib2.0-dev \
            build-essential curl wget file \
            libssl-dev patchelf \
            cmake nasm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Linux release binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Package binary
        working-directory: src-tauri/target/release
        run: |
          mkdir -p pkg
          cp inputsync pkg/
          sha256sum inputsync > pkg/SHA256SUMS-linux.txt
          cat pkg/SHA256SUMS-linux.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: src-tauri/target/release/pkg/
          if-no-files-found: error

  # ── Windows binary ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64 (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Windows release binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Compute checksum
        shell: pwsh
        working-directory: src-tauri/target/release
        run: |
          Get-FileHash inputsync.exe -Algorithm SHA256 | `
            ForEach-Object { "$($_.Hash)  inputsync.exe" } | `
            Out-File -FilePath "SHA256SUMS-windows.txt"
          Get-Content SHA256SUMS-windows.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            src-tauri/target/release/inputsync.exe
            src-tauri/target/release/SHA256SUMS-windows.txt
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: (startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true') && always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        if: needs.build-linux.result == 'success'
        with:
          name: linux-binary
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        if: needs.build-windows.result == 'success'
        with:
          name: windows-exe
          path: release-assets/windows

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "InputSync ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-assets/linux/inputsync
            release-assets/linux/SHA256SUMS-linux.txt
            release-assets/windows/inputsync.exe
            release-assets/windows/SHA256SUMS-windows.txt
          body: |
            ## InputSync ${{ github.ref_name }}

            Cross-platform software KVM switch — control multiple computers with one keyboard and mouse over your local network, with end-to-end encryption.

            **No WebView2 required.** Native egui GUI — single portable binary (~9MB).

            ---

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Linux** (x86_64) | `inputsync` | Run directly, no install needed |
            | **Windows** (10/11 x64) | `inputsync.exe` | Run directly, no installer needed |

            ---

            ### Quick Start

            1. **Server (keyboard/mouse machine):** Run InputSync → Start Server → note the 6-character code + IP
            2. **Client (machine to control):** Run InputSync → Enter code + IP → Connect
            3. **Switch control:** Press **ScrollLock** or click Forwarding toggle
            4. All input events are encrypted end-to-end (X25519 + ChaCha20-Poly1305)

            ---

            ### System Requirements

            **Linux:** `libx11`, `libxtst`, `libxdo`, `libwayland` (most distros include these)
            **Windows:** Windows 10+ x64 — no additional runtime required
            **Network:** TCP :24800 + UDP :24801-24802 open on server

            ---

            ### Verify Downloads

            ```bash
            # Linux
            sha256sum -c SHA256SUMS.txt
            chmod +x inputsync && ./inputsync

            # Windows (PowerShell)
            Get-FileHash inputsync.exe -Algorithm SHA256
            ```

            ---

            *Built with Rust + egui (no WebView2, no Electron)*
