name: Build InputSync

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux .deb (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libx11-dev \
            libxtst-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libglib2.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Linux .deb
        run: |
          cargo install tauri-cli --version "^2" --locked
          cargo tauri build --bundles deb

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: InputSync-linux-x64
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  build-windows:
    name: Windows .exe (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows NSIS installer
        run: cargo tauri build --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: InputSync-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/InputSync-linux-x64/*.deb
            artifacts/InputSync-windows-x64/*.exe
          name: InputSync ${{ github.ref_name }}
          body: |
            ## InputSync ${{ github.ref_name }}

            ### Downloads
            - **Linux** (Ubuntu/Debian): `InputSync_*_amd64.deb`
            - **Windows**: `InputSync_*_x64-setup.exe`

            ### Installation
            **Linux:**
            ```bash
            sudo dpkg -i InputSync_*_amd64.deb
            ```
            **Windows:** Run the `.exe` installer.
